{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center font-sans px-4">
    <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 w-full max-w-md transform transition-all">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-50 text-teal-600 mb-5 border border-teal-100 shadow-sm">
                <i class="fas fa-calendar-check text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">ImpleSched</h1>
            
            <div class="mt-2 mb-3">
                <span class="bg-teal-50 text-teal-700 px-3 py-1 rounded-md text-[11px] font-bold uppercase tracking-widest border border-teal-200">
                    SBU - teraMedikCE
                </span>
            </div>
            
            <p class="text-slate-500 text-sm">Masuk untuk mengelola jadwal implementasi.</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
            <div>
                <label class="text-sm font-semibold text-slate-700 mb-1.5 block">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-400 text-sm"></i>
                    </div>
                    <input type="text" name="username" required placeholder="Masukkan username" 
                           class="w-full pl-10 pr-4 py-3 text-sm border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 transition-all placeholder-slate-300 bg-slate-50/50 focus:bg-white">
                </div>
            </div>
            
            <div>
                <label class="text-sm font-semibold text-slate-700 mb-1.5 block">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400 text-sm"></i>
                    </div>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 text-sm border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 transition-all placeholder-slate-300 bg-slate-50/50 focus:bg-white">
                </div>
            </div>
            
            <div class="pt-4">
                <button type="submit" 
                        class="w-full py-3.5 text-sm bg-teal-600 text-white rounded-xl font-bold shadow-md shadow-teal-200 hover:bg-teal-700 hover:shadow-lg transition-all transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
                    <span>Sign In</span> <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </div>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400 font-medium">
            <p>&copy; 2026 SBU - teraMedikCE. All rights reserved.</p>
        </div>
        
    </div>
</div>
{% endblock %}
