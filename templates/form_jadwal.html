{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('dashboard') }}" class="text-blue-600 hover:underline text-sm font-bold">← Kembali ke Dashboard</a>
    </div>
    <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-8 border-b pb-4">Form Jadwal Training</h2>
        <form action="{{ url_for('tambah_jadwal') }}" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nama Klinik</label>
                    <input type="text" name="nama_klinik" placeholder="Contoh: Klinik Medika Utama" required
                           class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nama PIC</label>
                    <input type="text" name="nama_pic" placeholder="Nama penanggung jawab" required
                           class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none focus:border-blue-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nomor HP / WhatsApp</label>
                <input type="text" name="no_hp" placeholder="0812xxxx" required
                       class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Tanggal Rencana Training</label>
                <input type="date" name="tanggal_training" required
                       class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none focus:border-blue-500">
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">
                    Simpan Jadwal Training
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
